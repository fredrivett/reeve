parent_config: ../.swiftlint.yml

disabled_rules:
  - force_unwrapping                    # intentional in test helpers
  - force_cast                          # as! [String: Any] is idiomatic for JSON assertions
  - file_length                         # test files are expected to be long
  - empty_string                        # comparing "" in assertions is intentional
  - non_optional_string_data_conversion # json.data(using: .utf8)! is standard test setup
