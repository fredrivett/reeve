name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build release DMG
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 .build/Reeve-${{ steps.version.outputs.version }}.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/Reeve-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          REPO_ROOT="$(pwd)"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/fredrivett/homebrew-tap.git tap-repo
          cd tap-repo

          mkdir -p Casks

          sed "s/REPLACE_VERSION/${VERSION}/g; s/REPLACE_SHA256/${SHA256}/g" "${REPO_ROOT}/homebrew/reeve.rb.template" > Casks/reeve.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/reeve.rb
          git commit -m "Update reeve to ${VERSION}"
          git push
