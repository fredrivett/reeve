included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - trailing_whitespace
  - identifier_name       # single-letter names are conventional (x/y coords, i index, v Codable)
  - type_body_length      # large SwiftUI views and services are expected
  - function_body_length  # complex async service functions are expected
  - cyclomatic_complexity # complex PM2 parsing logic is expected
  - large_tuple           # internal return types don't warrant a named struct

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - redundant_nil_coalescing

line_length:
  warning: 200
  error: 200

# Central services (e.g. PM2Service) legitimately run long, in the same spirit
# as the disabled *_body_length rules above.
file_length:
  warning: 600
  error: 800
